# /etc/cloud/cloud.cfg.d/99-preserve-hostname.cfg
#
# Prevent cloud-init from rewriting /etc/hostname on every boot. The Brev/GCE
# datasource will otherwise rename this host periodically (observed 2026-05-06:
# <node-name> → <os-hostname>), which breaks kubelet because
# its client certificate is CN=system:node:<node-name>.
#
# Belt-and-suspenders: kubelet itself is hardened with
#   --hostname-override=<node-name>
# in /var/lib/kubelet/kubeadm-flags.env, so even if cloud-init does manage to
# rename the host again, the cluster keeps working. This file just removes the
# trigger so we don't accumulate churn on reboots.

preserve_hostname: true
