# SynthSeg base-mode labelling Job for Dataset045 + Dataset048.
#
# Runs SynthSeg v1.0 (--v1, bundled weights) over the curated FOMO300K
# subject manifest. Writes per-subject T1 + 14 binary masks (aseg
# classes incl. brainstem, cerebellum, ventricles, thalami, basal
# ganglia, hippocampi) to /factory/intermediate/synthseg_base/.
#
# Mode: Indexed Job — k8s spawns `completions` pods, each gets
# JOB_COMPLETION_INDEX as its shard id; the labeller picks 1/N of the
# manifest based on that index. CPU-only — does not contend with the
# running training MIG slices.
#
# Throughput: each pod runs SynthSeg single-process with `--threads 4`,
# ~90s/subject. 10 shards × ~192 subjects = ~5h wall-time on this
# manifest (1922 subjects).

apiVersion: batch/v1
kind: Job
metadata:
  name: synthseg-base
  namespace: model-factory
  labels:
    app.kubernetes.io/managed-by: modelfactory
    factory.io/component: label-generation
    factory.io/labeller: synthseg-base
    kueue.x-k8s.io/queue-name: factory-lq
    # Label-gen is background prep — must NOT preempt fold training.
    # `hpo-sweep` priority (value 10) sits below `fold-training` (50),
    # so any training Workload in the queue will preempt these pods
    # rather than the other way around. (Earlier we used
    # `interactive-eval`=100 here and it preempted Dataset023's
    # folds 3 + 4 on 2026-05-13 17:02; never again.)
    kueue.x-k8s.io/priority-class: hpo-sweep
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 604800
  completions: 10
  parallelism: 10
  completionMode: Indexed
  template:
    metadata:
      labels:
        app.kubernetes.io/managed-by: modelfactory
        factory.io/component: label-generation
        factory.io/labeller: synthseg-base
    spec:
      restartPolicy: Never
      nodeSelector:
        factory.io/training: "true"
      containers:
      - name: labeller
        image: synthseg-labeler:2026-05-13b
        imagePullPolicy: IfNotPresent
        env:
        - { name: PYTHONPATH,        value: "/opt/synthseg:/code/src" }
        - { name: SYNTHSEG_THREADS,  value: "4" }
        - { name: TF_NUM_INTEROP_THREADS, value: "1" }
        - { name: TF_NUM_INTRAOP_THREADS, value: "4" }
        command: ["sh", "-c"]
        args:
        - |
          python -m modelfactory.labelers.fomo_synthseg \
            --manifest /factory/intermediate/Dataset045_manifest.tsv \
            --out-root /factory/intermediate/synthseg_base \
            --mode base \
            --shard "${JOB_COMPLETION_INDEX}" \
            --of 10 -v
        resources:
          requests: { cpu: "5",  memory: "16Gi" }
          limits:   { cpu: "8",  memory: "32Gi" }
        volumeMounts:
        - { name: fomo,         mountPath: /data/FOMO300K, readOnly: true }
        - { name: factory-data, mountPath: /factory }
        - { name: code,         mountPath: /code,      readOnly: true }
        - { name: synthseg-models, mountPath: /opt/synthseg/models, readOnly: true }
      volumes:
      - name: fomo
        hostPath: { path: /data/FOMO300K,            type: Directory }
      - name: synthseg-models
        hostPath: { path: /data/synthseg_models,     type: Directory }
      - name: factory-data
        hostPath: { path: /data/model-factory-nfs,   type: Directory }
      - name: code
        hostPath: { path: /data/model-factory,       type: Directory }
