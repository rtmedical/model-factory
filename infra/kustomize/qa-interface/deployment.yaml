apiVersion: apps/v1
kind: Deployment
metadata:
  name: qa-viewer
  namespace: model-factory
  labels:
    app: qa-viewer
spec:
  replicas: 1
  # One predictor cache + one CUDA context. Recreate so we never have two
  # pods fighting for GPU 0 during a rollout.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: qa-viewer
  template:
    metadata:
      labels:
        app: qa-viewer
    spec:
      # nvidia-legacy honours NVIDIA_VISIBLE_DEVICES; the default `nvidia`
      # runtime would override it via CDI annotations. See
      # `~/.claude/projects/-data-model-factory/memory/gpu_runtime_class_lesson.md`
      runtimeClassName: nvidia-legacy
      nodeSelector:
        factory.io/training: "true"
      containers:
      - name: qa-viewer
        image: model-qa:0.9.2
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
          name: http
        env:
        # Whole GPU 0 — reassigned from doserad on 2026-05-15. If you need to
        # release it, change this to a MIG slice UUID and update CLAUDE.md.
        - { name: NVIDIA_VISIBLE_DEVICES,   value: "0" }
        - { name: NVIDIA_DRIVER_CAPABILITIES, value: "compute,utility" }
        - { name: QA_FACTORY_ROOT,          value: "/factory" }
        - { name: QA_WEB_STATIC_DIR,        value: "/opt/qa-viewer/web" }
        # 6 so a full 5-fold cross-validation run (5 single-fold predictors +
        # 1 ensemble) stays resident without mid-run LRU thrash on GPU 0
        # (whole H100, 80 GB). The orchestrator also raises this at runtime.
        - { name: QA_PREDICTOR_CACHE_SIZE,  value: "6" }
        # Parallel training slots the factory runs (GPUs 3-7 MIG = 10). Used
        # only to PROJECT when queued/planned trainings start+finish on the
        # home calendar — the pod can't see live MIG/Kueue, so it's a config.
        - { name: QA_TRAINING_SLOTS,        value: "10" }
        # Dragonfly pointer-cache for inference + metrics results.
        # Defined in ./dragonfly.yaml. Speaks RESP, so the URL scheme
        # and the redis-py client are unchanged. If this URL is
        # unreachable the cache layer is a no-op — every run computes
        # fresh (degradation, not failure).
        - { name: QA_REDIS_URL,             value: "redis://qa-dragonfly:6379/0" }
        - { name: MLFLOW_TRACKING_URI,      value: "file:///factory/mlflow" }
        - { name: nnUNet_raw,               value: "/factory/datasets" }
        - { name: nnUNet_preprocessed,      value: "/factory/preprocessed" }
        - { name: nnUNet_results,           value: "/factory/results" }
        resources:
          # No nvidia.com/gpu request — we pin by UUID/index via env. The
          # device plugin must not allocate this pod.
          requests:
            cpu: "4"
            memory: "16Gi"
          limits:
            cpu: "12"
            # 96Gi (was 32Gi): the 23-class D117 mega-model's export step
            # resamples a 23-channel float32 logits map back to the full CT
            # grid, peaking ~35-45 GB host RAM — over the old 32Gi ceiling,
            # so the pod was OOMKilled (exit 137) mid-inference and D117
            # predictions hung at `running` forever. Specialists (3-5 classes)
            # fit under 32Gi. Node has ~1.3 TB free, so 96Gi is safe headroom.
            memory: "96Gi"
        # Probes use /api/livez (a no-I/O stub), not /api/healthz, because
        # nnUNet predict offloaded to asyncio.to_thread still holds the GIL
        # in the worker (torch.load, numpy resample, NIfTI save) and starves
        # the event loop for 1–10s in bursts. The default 1s timeoutSeconds
        # would trip on every brain-MR predict — pod gets evicted from
        # Endpoints → reverse proxy 502s on /api/queue, /api/predictions,
        # everything. Don't tighten these without checking the GIL pattern.
        readinessProbe:
          httpGet: { path: /api/livez, port: 8080 }
          initialDelaySeconds: 10
          periodSeconds: 20
          timeoutSeconds: 10
          failureThreshold: 3
        livenessProbe:
          httpGet: { path: /api/livez, port: 8080 }
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 15
          failureThreshold: 6
        volumeMounts:
        - { name: factory-data, mountPath: /factory }
        - { name: dshm,         mountPath: /dev/shm }
      volumes:
      - name: factory-data
        hostPath: { path: /data/model-factory-nfs, type: Directory }
      - name: dshm
        emptyDir: { medium: Memory, sizeLimit: "4Gi" }
