# Template for the credential secrets the factory expects.  Do NOT commit real
# values — copy to secrets.yaml (gitignored) and replace before applying.
#
#   kubectl apply -f secrets.yaml
#
# The Postgres and MinIO Bitnami charts each create their own Secret on install;
# their names are referenced from infra/helm/{postgres,minio}/values.yaml.  The
# only secret you must create yourself is the one MLflow reads from for basic auth.

apiVersion: v1
kind: Secret
metadata:
  name: mlflow-credentials
  namespace: model-factory
type: Opaque
stringData:
  admin-username: nvidia
  admin-password: REPLACE_ME
